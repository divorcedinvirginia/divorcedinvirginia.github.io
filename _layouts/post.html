---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %} &mdash; {{ page.author }}{% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
  .post-meta {
    color: #666;
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }
</style>
