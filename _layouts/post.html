---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %} &mdash; {{ page.author }}{% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="post-comments-cta">
    <p>Have a question or comment about this post? <a href="mailto:divorcedinvirginia@gmail.com?subject=Comment: {{ page.title | uri_escape }}">Send us an email</a> — we read every message.</p>
  </div>
</article>

<style>
  .post-meta {
    color: #666;
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }
  .post-comments-cta {
    margin-top: 2.5rem;
    padding: 1rem 1.25rem;
    background: #f5f5f5;
    border-left: 3px solid #333;
    font-size: 0.95rem;
    color: #444;
  }
  .post-comments-cta p {
    margin: 0;
  }
</style>
